# 2/2 — On every code change: configure, build, and run tests inside the published
# `:base` image from GHCR (same ref as build-base-container.yml).
#
# Job graph: ensure-base-image → build-and-test
#   (tests only start after we confirm the image exists in GHCR).
name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read
  packages: read

env:
  BUILD_DIR: build

jobs:
  ensure-base-image:
    name: Verify GHCR base image exists
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.resolve.outputs.image }}
    steps:
      - id: resolve
        name: Resolve GHCR image reference
        run: |
          repo_lc=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')
          img="ghcr.io/${repo_lc}:base"
          echo "image=${img}" >> "$GITHUB_OUTPUT"
          {
            echo "### CI base image"
            echo "Expected image: \`${img}\`"
            echo ""
            echo "This job must pull that tag from GitHub Container Registry before **build-and-test** runs."
            echo "The tag is created by the **build-base-container** workflow when \`Dockerfile\` changes on the default branch."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull base image from GHCR
        run: |
          IMAGE="${{ steps.resolve.outputs.image }}"
          echo "Pulling: ${IMAGE}"
          if docker pull "${IMAGE}"; then
            echo "Base image is available."
            exit 0
          fi
          echo ""
          echo "::error title=Base image not found in GHCR::Could not pull \`${IMAGE}\`. Nothing was found at that tag (or the registry denied access)."
          echo ""
          echo "::group::What to do next"
          echo "1. Run **build-base-container** at least once: merge or push a commit that changes \`Dockerfile\` on \`main\` or \`master\`."
          echo "2. Wait until that workflow finishes and the package appears under the repo's **Packages** (or your account/org packages)."
          echo "3. Re-run this **CI** workflow."
          echo "::endgroup::"
          exit 1

  build-and-test:
    name: Build and test in container
    needs: ensure-base-image
    runs-on: ubuntu-latest
    container:
      image: ${{ needs.ensure-base-image.outputs.image }}
      credentials:
        username: ${{ github.repository_owner }}
        password: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure CMake
        run: |
          cmake -B ${{ env.BUILD_DIR }} \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_TESTING=ON

      - name: Build
        run: cmake --build ${{ env.BUILD_DIR }} --parallel

      - name: Test
        run: ctest --test-dir ${{ env.BUILD_DIR }} --output-on-failure
